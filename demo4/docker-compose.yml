services:

  # PostgreSQL veritabanı container'ı
  postgres:
    image: postgres:16
    container_name: demo4-postgres
    environment:
      POSTGRES_DB: demo4db
      POSTGRES_USER: demo4user
      POSTGRES_PASSWORD: demo4pass
    ports:
      - "5432:5432"       # host:container — dışarıdan bağlanmak istersen
    volumes:
      - postgres-data:/var/lib/postgresql/data  # veriler container silinse de kalır

  # Spring Boot uygulama container'ı
  app:
    image: ${DOCKERHUB_USERNAME:-hasandemircse}/spring-demos-app:latest
    container_name: demo4-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/demo4db"
      SPRING_DATASOURCE_USERNAME: "demo4user"
      SPRING_DATASOURCE_PASSWORD: "demo4pass"
    depends_on:
      - postgres

  # React frontend container'ı
  frontend:
    image: ${DOCKERHUB_USERNAME:-hasandemircse}/spring-demos-frontend:latest
    container_name: demo4-frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  postgres-data:           # isimli volume — docker tarafından yönetilir
