# -------------------------------------------------------
# PROD profili — production / docker ortamı
# docker-compose.yml'de SPRING_PROFILES_ACTIVE=prod ile aktif olur
# -------------------------------------------------------

# PostgreSQL — ortam değişkenlerinden gelir, kod içinde şifre olmaz
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 konsolu prod'da kapalı
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Prod'da SQL sorgularını gösterme — performans ve güvenlik
spring.jpa.show-sql=false

# Prod'da sadece hata logları
logging.level.com.hasan.demo4=WARN

# Author Service — docker-compose'da AUTHOR_SERVICE_URL env değişkeniyle gelir
author.service.url=${AUTHOR_SERVICE_URL:http://localhost:8081}
