# -------------------------------------------------------
# DEV profili — yerel geliştirme ortamı
# ./mvnw spring-boot:run ile çalışınca bu dosya aktif olur
# -------------------------------------------------------

# H2 in-memory veritabanı — kurulum gerektirmez
spring.datasource.url=jdbc:h2:mem:testdb;COLLATION=TURKISH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 web konsolu — http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Dev'de tüm SQL sorgularını göster
spring.jpa.show-sql=true

# Dev'de tüm logları aç
logging.level.com.hasan.demo4=DEBUG
