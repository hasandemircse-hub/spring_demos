# CI/CD Pipeline — Build, test, Docker Hub'a push, EC2'ya deploy
name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── 1. JOB: Book Service — Test ────────────────────────────────────────────
  book-service-test:
    name: Book Service — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4
        run: ./mvnw verify -q

  # ── 2. JOB: Author Service — Test ─────────────────────────────────────────
  author-service-test:
    name: Author Service — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4-author-service/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4-author-service
        run: mvn verify -q

  # ── 3. JOB: Docker Build & Push — sadece main'e push'ta çalışır ───────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ book-service-test, author-service-test ]  # testler geçmeden build etme
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Book Service image build & push
      - name: Build & Push Book Service
        uses: docker/build-push-action@v6
        with:
          context: demo4
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:latest

      # Frontend image build & push (API URL'i build sırasında gömülür)
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: demo4-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:latest
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.EC2_HOST }}:8080

  # ── 4. JOB: EC2'ya Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push   # image'lar push'lanmadan deploy etme

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/spring_demos
            git pull
            cd demo4
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker image prune -f
