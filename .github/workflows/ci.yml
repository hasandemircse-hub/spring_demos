# CI/CD Pipeline — Build, test, Docker Hub'a push, EC2'ya deploy
name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── 1. JOB: Book Service — Test ────────────────────────────────────────────
  book-service-test:
    name: Book Service — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4
        run: ./mvnw verify -q

  # ── 2. JOB: Author Service — Test ─────────────────────────────────────────
  author-service-test:
    name: Author Service — Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4-author-service/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4-author-service
        run: mvn verify -q

  # ── 3. JOB: Docker Build & Push — sadece main'e push'ta çalışır ───────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ book-service-test, author-service-test ]  # testler geçmeden build etme
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # outputs → bu job'daki değerleri deploy job'ına taşır
    # steps.ts.outputs.value job sınırını geçemez, outputs bloğu köprü görevi görür
    outputs:
      timestamp: ${{ steps.ts.outputs.value }}

    steps:
      - uses: actions/checkout@v4.2.2

      # Deploy tarihi ve saatini üret — image tag'i ve backup dosya adında kullanılır
      - name: Generate timestamp
        id: ts
        run: echo "value=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Book Service: hem latest hem tarihli tag ile push edilir
      # latest → docker compose pull'un bulduğu tag
      # tarihli tag → Docker Hub'da kalıcı yedek
      - name: Build & Push Book Service
        uses: docker/build-push-action@v6
        with:
          context: demo4
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:${{ steps.ts.outputs.value }}

      # Author Service: aynı şekilde iki tag
      - name: Build & Push Author Service
        uses: docker/build-push-action@v6
        with:
          context: demo4-author-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:${{ steps.ts.outputs.value }}

      # Frontend: aynı şekilde iki tag
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: demo4-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:${{ steps.ts.outputs.value }}
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.EC2_HOST }}:8080

  # ── 4. JOB: EC2'ya Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push   # image'lar push'lanmadan deploy etme

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # needs.docker-build-push.outputs.timestamp → job outputs üzerinden gelir
            # steps.ts.outputs.value deploy job'ında erişilemez, bu yüzden job output kullandık
            TIMESTAMP=${{ needs.docker-build-push.outputs.timestamp }}
            BACKUP_DIR=~/docker-backups
            mkdir -p $BACKUP_DIR

            # ── Yedek al ────────────────────────────────────────────────────────
            # Yeni image çekilmeden önce mevcut çalışan image'ı tar.gz'e aktar
            # docker save → image'ı stdout'a yazar | gzip → sıkıştır > dosyaya yaz
            echo "[$TIMESTAMP] Yedek alınıyor..."
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:latest     | gzip > $BACKUP_DIR/app-$TIMESTAMP.tar.gz
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:latest  | gzip > $BACKUP_DIR/author-$TIMESTAMP.tar.gz
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:latest | gzip > $BACKUP_DIR/frontend-$TIMESTAMP.tar.gz

            # ── Son 3 yedeği tut, eskileri sil ──────────────────────────────────
            # ls -t → tarihe göre sırala (en yeni başta)
            # tail -n +4 → 4. satırdan sonrasını al (ilk 3'ü atla)
            # xargs -r rm → gelen dosyaları sil (-r: dosya yoksa hata verme)
            ls -t $BACKUP_DIR/app-*.tar.gz      | tail -n +4 | xargs -r rm
            ls -t $BACKUP_DIR/author-*.tar.gz   | tail -n +4 | xargs -r rm
            ls -t $BACKUP_DIR/frontend-*.tar.gz | tail -n +4 | xargs -r rm
            echo "Yedekler temizlendi. Kalan yedekler:"
            ls -lh $BACKUP_DIR

            # ── Deploy ──────────────────────────────────────────────────────────
            cd ~/spring_demos
            git pull
            cd demo4
            sudo docker compose pull
            CORS_ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }} sudo -E docker compose up -d

            # Sadece tag'siz (dangling) image'ları sil — yedekli tag'ler korunur
            sudo docker image prune -f
