# CI/CD Pipeline — Build, test, Docker Hub'a push, EC2'ya deploy
name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Deploy edilecek servis (app, author, frontend, all)'
        required: true
        default: 'all'
        type: choice
        options: [ all, app, author, frontend ]

jobs:

  # ── 0. JOB: Hangi servisler değişti? ──────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app:      ${{ steps.filter.outputs.app }}
      author:   ${{ steps.filter.outputs.author }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'demo4/**'
            author:
              - 'demo4-author-service/**'
            frontend:
              - 'demo4-frontend/**'

  # ── 1. JOB: Book Service — Test ────────────────────────────────────────────
  book-service-test:
    name: Book Service — Test
    runs-on: ubuntu-latest
    needs: detect-changes
    # Sadece demo4/ değiştiyse VEYA elle app/all seçildiyse çalış
    if: |
      needs.detect-changes.outputs.app == 'true' ||
      inputs.service == 'app' ||
      inputs.service == 'all'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4
        run: ./mvnw verify -q

  # ── 2. JOB: Author Service — Test ─────────────────────────────────────────
  author-service-test:
    name: Author Service — Test
    runs-on: ubuntu-latest
    needs: detect-changes
    # Sadece demo4-author-service/ değiştiyse VEYA elle author/all seçildiyse çalış
    if: |
      needs.detect-changes.outputs.author == 'true' ||
      inputs.service == 'author' ||
      inputs.service == 'all'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('demo4-author-service/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Test
        working-directory: demo4-author-service
        run: mvn verify -q

  # ── 3. JOB: Docker Build & Push ───────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [ detect-changes, book-service-test, author-service-test ]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    outputs:
      timestamp: ${{ steps.ts.outputs.value }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate timestamp
        id: ts
        run: echo "value=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Book Service
        if: |
          needs.detect-changes.outputs.app == 'true' ||
          inputs.service == 'app' ||
          inputs.service == 'all'
        uses: docker/build-push-action@v6
        with:
          context: demo4
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:${{ steps.ts.outputs.value }}

      - name: Build & Push Author Service
        if: |
          needs.detect-changes.outputs.author == 'true' ||
          inputs.service == 'author' ||
          inputs.service == 'all'
        uses: docker/build-push-action@v6
        with:
          context: demo4-author-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:${{ steps.ts.outputs.value }}

      - name: Build & Push Frontend
        if: |
          needs.detect-changes.outputs.frontend == 'true' ||
          inputs.service == 'frontend' ||
          inputs.service == 'all'
        uses: docker/build-push-action@v6
        with:
          context: demo4-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:${{ steps.ts.outputs.value }}
          build-args: |
            REACT_APP_API_URL=http://${{ secrets.EC2_HOST }}:8080

  # ── 4. JOB: EC2'ya Deploy ─────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [ detect-changes, docker-build-push ]
    if: always() && needs.docker-build-push.result == 'success'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            TIMESTAMP=${{ needs.docker-build-push.outputs.timestamp }}
            BACKUP_DIR=~/docker-backups
            mkdir -p $BACKUP_DIR

            echo "[$TIMESTAMP] Yedek alınıyor..."
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-app:latest      | gzip -1 > $BACKUP_DIR/app-$TIMESTAMP.tar.gz
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-author:latest   | gzip -1 > $BACKUP_DIR/author-$TIMESTAMP.tar.gz
            sudo docker save ${{ secrets.DOCKERHUB_USERNAME }}/spring-demos-frontend:latest | gzip -1 > $BACKUP_DIR/frontend-$TIMESTAMP.tar.gz

            ls -t $BACKUP_DIR/app-*.tar.gz      | tail -n +3 | xargs -r rm
            ls -t $BACKUP_DIR/author-*.tar.gz   | tail -n +3 | xargs -r rm
            ls -t $BACKUP_DIR/frontend-*.tar.gz | tail -n +3 | xargs -r rm

            cd ~/spring_demos && git pull && cd demo4

            SERVICE=${{ inputs.service || 'all' }}
            if [ "$SERVICE" = "all" ]; then
                sudo docker compose pull
                CORS_ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }} sudo -E docker compose up -d
            else
                sudo docker compose pull $SERVICE
                CORS_ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }} sudo -E docker compose up -d --no-deps $SERVICE
            fi

            sudo docker image prune -f
